<div class="container mt-3">
  <h2 class="mb-3">My Performance Reviews</h2>

  <div class="card mb-3">
    <div class="card-body">
      <form class="row g-3 align-items-end" (ngSubmit)="loadReviews()" #f="ngForm">
        <div class="col-md-4">
          <label for="employeeId" class="form-label">Employee ID</label>
          <input type="number" id="employeeId" name="employeeId" class="form-control" required [(ngModel)]="employeeId" />
        </div>
        <div class="col-md-3">
          <button type="submit" class="btn btn-primary" [disabled]="f.invalid">Load My Reviews</button>
        </div>
      </form>
    </div>
  </div>

  <div class="table-responsive">
    <table class="table table-sm table-striped table-bordered">
      <thead class="table-light">
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Period</th>
          <th scope="col">Rating</th>
          <th scope="col">Date</th>
          <th scope="col">Feedback</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of reviews">
          <td>{{ r.id }}</td>
          <td>{{ r.reviewPeriod }}</td>
          <td>{{ r.rating }}</td>
          <td>{{ r.reviewDate | date: 'yyyy-MM-dd' }}</td>
          <td>{{ r.feedback }}</td>
        </tr>
        <tr *ngIf="reviews.length === 0">
          <td colspan="5" class="text-center text-muted">No reviews. Enter Employee ID and click Load.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
