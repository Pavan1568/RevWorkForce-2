<div class="container mt-3">

  <h2 class="mb-3">My Leaves</h2>

  <div class="table-responsive">

    <table class="table table-striped table-bordered table-sm">

      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Type</th>
          <th>Start Date</th>
          <th>End Date</th>
          <th>Status</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let l of myLeaves">
          <td>{{ l.id }}</td>
          <td>{{ getLeaveTypeName(l.leaveTypeId) }}</td>
          <td>{{ l.startDate | date:'yyyy-MM-dd' }}</td>
          <td>{{ l.endDate | date:'yyyy-MM-dd' }}</td>
          <td>
            <span class="badge bg-warning" *ngIf="l.status==='PENDING'">Pending</span>
            <span class="badge bg-success" *ngIf="l.status==='APPROVED'">Approved</span>
            <span class="badge bg-danger" *ngIf="l.status==='REJECTED'">Rejected</span>
          </td>
        </tr>

        <tr *ngIf="myLeaves.length === 0">
          <td colspan="5" class="text-center text-muted">
            No leave records found
          </td>
        </tr>

      </tbody>

    </table>

  </div>

</div>
