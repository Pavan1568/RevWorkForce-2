<div class="container mt-3">
  <h2 class="mb-3">My Leaves</h2>

  <!-- Apply leave form -->
  <div class="card mb-4">
    <div class="card-header">
      <strong>Apply for Leave</strong>
    </div>
    <div class="card-body">
      <form #leaveForm="ngForm" (ngSubmit)="applyLeave()">
        <div class="row g-3">

          <div class="col-md-4">
            <label for="leaveType" class="form-label">Leave Type</label>
            <select
              id="leaveType"
              name="leaveTypeId"
              class="form-select"
              required
              [(ngModel)]="newLeave.leaveTypeId"
            >
              <option [ngValue]="null">-- Select Leave Type --</option>
              <option *ngFor="let lt of leaveTypes" [ngValue]="lt.id">
                {{ lt.name }}
              </option>
            </select>
          </div>

          <div class="col-md-3">
            <label for="startDate" class="form-label">Start Date</label>
            <input
              type="date"
              id="startDate"
              name="startDate"
              class="form-control"
              required
              [(ngModel)]="newLeave.startDate"
            />
          </div>

          <div class="col-md-3">
            <label for="endDate" class="form-label">End Date</label>
            <input
              type="date"
              id="endDate"
              name="endDate"
              class="form-control"
              required
              [(ngModel)]="newLeave.endDate"
            />
          </div>

          <div class="col-md-12">
            <label for="reason" class="form-label">Reason (optional)</label>
            <textarea
              id="reason"
              name="reason"
              class="form-control"
              rows="2"
              [(ngModel)]="newLeave.reason"
            ></textarea>
          </div>

        </div>

        <div class="mt-3">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="leaveForm.invalid || isSubmitting"
          >
            {{ isSubmitting ? 'Submitting...' : 'Submit Leave Request' }}
          </button>
        </div>
      </form>
    </div>
  </div>

  <!-- My leaves table -->
  <div class="table-responsive">
    <table class="table table-sm table-striped table-bordered">
      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Type</th>
          <th>Start Date</th>
          <th>End Date</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let l of myLeaves">
          <td>{{ l.id }}</td>
          <td>{{ l.leaveTypeName || l.leaveType?.name }}</td>
          <td>{{ l.startDate | date: 'yyyy-MM-dd' }}</td>
          <td>{{ l.endDate | date: 'yyyy-MM-dd' }}</td>

          <!-- ✅ PROFESSIONAL STATUS BADGES -->
          <td>
            <span class="badge"
              [ngClass]="{
                'bg-warning text-dark': l.status === 'PENDING',
                'bg-success': l.status === 'APPROVED',
                'bg-danger': l.status === 'REJECTED',
                'bg-secondary': l.status === 'CANCELLED'
              }">
              {{ l.status }}
            </span>
          </td>

        </tr>

        <tr *ngIf="myLeaves.length === 0">
          <td colspan="5" class="text-center text-muted">
            No leave records found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
