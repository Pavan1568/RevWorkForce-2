<div class="container mt-3">

  <h2 class="mb-3">Apply Leave</h2>

  <div class="card">
    <div class="card-body">

      <form (ngSubmit)="applyLeave()" #f="ngForm">

        <div class="row g-3">

          <div class="col-md-4">
            <label class="form-label">Leave Type</label>

            <select
              class="form-select"
              required
              [(ngModel)]="newLeave.leaveTypeId"
              name="leaveTypeId">

              <option [ngValue]="null">Select Leave Type</option>

              <option *ngFor="let lt of leaveTypes" [ngValue]="lt.id">
                {{ lt.name }}
              </option>

            </select>
          </div>

          <div class="col-md-4">
            <label class="form-label">Start Date</label>

            <input
              type="date"
              class="form-control"
              required
              [(ngModel)]="newLeave.startDate"
              name="startDate">
          </div>

          <div class="col-md-4">
            <label class="form-label">End Date</label>

            <input
              type="date"
              class="form-control"
              required
              [(ngModel)]="newLeave.endDate"
              name="endDate">
          </div>

          <div class="col-md-12">
            <label class="form-label">Reason</label>

            <input
              type="text"
              class="form-control"
              [(ngModel)]="newLeave.reason"
              name="reason">
          </div>

        </div>

        <div class="mt-3">
          <button
            class="btn btn-primary"
            type="submit"
            [disabled]="f.invalid || isSubmitting">

            Apply Leave
          </button>
        </div>

      </form>

    </div>
  </div>

</div>
