<div class="container mt-3">
  <h2 class="mb-3">User Management</h2>

  <!-- Users table -->
  <div class="table-responsive mb-4">
    <table class="table table-sm table-striped table-bordered">
      <thead class="table-light">
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Email</th>
          <th scope="col">Active</th>
          <th scope="col">Roles</th>
          <th scope="col">Status</th>
          <th scope="col">Action</th>
        </tr>
      </thead>
      <tbody>
  <tr *ngFor="let user of users">
    <td>{{ user.id }}</td>
    <td>{{ user.email }}</td>

    <!-- Active Badge -->
    <td>
      <span
        class="badge"
        [ngClass]="user.active ? 'bg-success' : 'bg-secondary'"
      >
        {{ user.active ? 'Yes' : 'No' }}
      </span>
    </td>

    <!-- Roles -->
    <td>
      <span *ngFor="let role of user.roles; let last = last">
        {{ role }}<span *ngIf="!last">, </span>
      </span>
    </td>

    <!-- Status Text -->
    <td>
      <span [ngClass]="user.active ? 'text-success' : 'text-danger'">
        {{ user.active ? 'Active' : 'Inactive' }}
      </span>
    </td>

    <!-- Toggle Button -->
    <td>
      <button
        class="btn btn-sm"
        [ngClass]="user.active ? 'btn-danger' : 'btn-success'"
        (click)="toggleStatus(user)"
      >
        {{ user.active ? 'Deactivate' : 'Activate' }}
      </button>
    </td>
  </tr>

  <!-- Empty State Row -->
  <tr *ngIf="users.length === 0">
    <td colspan="6" class="text-center text-muted">
      No users found.
    </td>
  </tr>
</tbody>

    </table>
  </div>

  <!-- Create user form -->
  <div class="card">
    <div class="card-header">
      <strong>Create New User</strong>
    </div>
    <div class="card-body">
      <form #userForm="ngForm" (ngSubmit)="createUser()">
        <div class="row g-3">
          <div class="col-md-4">
            <label for="email" class="form-label">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              class="form-control"
              required
              [(ngModel)]="newUser.email"
            />
          </div>

          <div class="col-md-4">
            <label for="password" class="form-label">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              class="form-control"
              required
              [(ngModel)]="newUser.password"
            />
          </div>

          <div class="col-md-4">
            <label for="role" class="form-label">Role (optional)</label>
            <input
              type="text"
              id="role"
              name="role"
              class="form-control"
              placeholder="e.g. ADMIN / MANAGER / EMPLOYEE"
              [(ngModel)]="newUser.role"
            />
          </div>
        </div>

        <div class="mt-3">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="userForm.invalid || isSubmitting"
          >
            {{ isSubmitting ? 'Creating...' : 'Create User' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
