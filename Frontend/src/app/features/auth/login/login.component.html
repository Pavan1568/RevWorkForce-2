<div class="login-wrapper">
  <div class="login-card shadow">

    <div class="text-center mb-4">
      <h2 class="brand">RevWorkForce</h2>
      <p class="text-muted">Employee Management System</p>
    </div>

    <form (ngSubmit)="login()">
      <div class="mb-3">
        <label>Email</label>
        <input type="email"
               class="form-control"
               [(ngModel)]="email"
               name="email"
               required>
      </div>

      <div class="mb-3">
        <label>Password</label>
        <input type="password"
               class="form-control"
               [(ngModel)]="password"
               name="password"
               required>
      </div>

      <button type="submit" class="btn btn-primary w-100 mt-3">
        Login
      </button>
    </form>

  </div>
</div>
