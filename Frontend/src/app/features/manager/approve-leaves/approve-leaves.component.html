<div class="container mt-3">

  <h2 class="mb-3">Approve Leave Requests</h2>

  <!-- Manager ID -->
  <div class="card mb-3">
    <div class="card-body">
      <form (ngSubmit)="loadLeaves()" #f="ngForm" class="row g-3 align-items-end">

        <div class="col-md-4">
          <label class="form-label">Manager ID</label>
          <input
            type="number"
            class="form-control"
            required
            name="managerId"
            [(ngModel)]="managerId"
          >
        </div>

        <div class="col-md-3">
          <button class="btn btn-primary" type="submit" [disabled]="f.invalid">
            Load Leaves
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- Leaves Table -->
  <div class="table-responsive">
    <table class="table table-striped table-bordered table-sm">

      <thead class="table-light">
        <tr>
          <th>ID</th>
          <th>Employee</th>
          <th>Leave Type</th>
          <th>Start Date</th>
          <th>End Date</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody>

        <tr *ngFor="let l of leaves">

          <td>{{ l.id }}</td>
          <td>{{ l.employeeId }}</td>
          <td>{{ l.leaveTypeId }}</td>
          <td>{{ l.startDate | date:'yyyy-MM-dd' }}</td>
          <td>{{ l.endDate | date:'yyyy-MM-dd' }}</td>
          <td>{{ l.status }}</td>

          <td>

  <span *ngIf="l.status === 'APPROVED'" class="badge bg-success">
    Approved
  </span>

  <span *ngIf="l.status === 'REJECTED'" class="badge bg-danger">
    Rejected
  </span>

  <div *ngIf="l.status === 'PENDING'">

    <button
      class="btn btn-success btn-sm me-2"
      (click)="approveLeave(l.id)">
      Approve
    </button>

    <button
      class="btn btn-danger btn-sm"
      (click)="rejectLeave(l.id)">
      Reject
    </button>

  </div>

</td>

        </tr>

        <tr *ngIf="leaves.length === 0">
          <td colspan="7" class="text-center text-muted">
            No leave requests found
          </td>
        </tr>

      </tbody>

    </table>
  </div>

</div>
