<div class="container mt-3">
  <h2 class="mb-3">Departments</h2>

  <!-- Departments table -->
  <div class="table-responsive mb-4">
    <table class="table table-sm table-striped table-bordered">
      <thead class="table-light">
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Name</th>
          <th scope="col" class="text-center">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let dept of departments">
          <td>{{ dept.id }}</td>
          <td>{{ dept.name }}</td>
          <td class="text-center">
            <button
              type="button"
              class="btn btn-sm btn-danger"
              (click)="deleteDepartment(dept)"
            >
              Delete
            </button>
          </td>
        </tr>
        <tr *ngIf="departments.length === 0">
          <td colspan="3" class="text-center text-muted">
            No departments found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Create department form -->
  <div class="card">
    <div class="card-header">
      <strong>Add New Department</strong>
    </div>
    <div class="card-body">
      <form #deptForm="ngForm" (ngSubmit)="createDepartment()">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="deptName" class="form-label">Department Name</label>
            <input
              type="text"
              id="deptName"
              name="name"
              class="form-control"
              required
              [(ngModel)]="newDepartment.name"
            />
          </div>
        </div>

        <div class="mt-3">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="deptForm.invalid || isSubmitting"
          >
            {{ isSubmitting ? 'Saving...' : 'Add Department' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
