<div class="container mt-3">
  <h2 class="mb-3">Holidays</h2>

  <!-- Holidays table -->
  <div class="table-responsive mb-4">
    <table class="table table-sm table-striped table-bordered">
      <thead class="table-light">
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Name</th>
          <th scope="col">Date</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let h of holidays">
          <td>{{ h.id }}</td>
          <td>{{ h.name }}</td>
          <td>{{ h.date | date: 'yyyy-MM-dd' }}</td>
        </tr>
        <tr *ngIf="holidays.length === 0">
          <td colspan="3" class="text-center text-muted">
            No holidays found.
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Create holiday form -->
  <div class="card">
    <div class="card-header">
      <strong>Add New Holiday</strong>
    </div>
    <div class="card-body">
      <form #holidayForm="ngForm" (ngSubmit)="createHoliday()">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="holidayName" class="form-label">Holiday Name</label>
            <input
              type="text"
              id="holidayName"
              name="name"
              class="form-control"
              required
              [(ngModel)]="newHoliday.name"
            />
          </div>
          <div class="col-md-6">
            <label for="holidayDate" class="form-label">Date</label>
            <input
              type="date"
              id="holidayDate"
              name="date"
              class="form-control"
              required
              [(ngModel)]="newHoliday.date"
            />
          </div>
        </div>

        <div class="mt-3">
          <button
            type="submit"
            class="btn btn-primary"
            [disabled]="holidayForm.invalid || isSubmitting"
          >
            {{ isSubmitting ? 'Saving...' : 'Add Holiday' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
