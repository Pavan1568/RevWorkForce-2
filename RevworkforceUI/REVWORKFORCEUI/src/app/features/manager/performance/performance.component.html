<div class="container mt-3">
  <h2 class="mb-3">Performance Reviews</h2>

  <div class="card mb-4">
    <div class="card-header"><strong>Team Reviews</strong></div>
    <div class="card-body">
      <form class="row g-3 align-items-end" (ngSubmit)="loadReviews()" #f="ngForm">
        <div class="col-md-4">
          <label for="managerId" class="form-label">Manager ID</label>
          <input type="number" id="managerId" name="managerId" class="form-control" required [(ngModel)]="managerId" />
        </div>
        <div class="col-md-3">
          <button type="submit" class="btn btn-secondary" [disabled]="f.invalid">Load Reviews</button>
        </div>
      </form>
    </div>
  </div>

  <div class="table-responsive mb-4">
    <table class="table table-sm table-striped table-bordered">
      <thead class="table-light">
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Employee ID</th>
          <th scope="col">Period</th>
          <th scope="col">Rating</th>
          <th scope="col">Date</th>
          <th scope="col">Feedback</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let r of reviews">
          <td>{{ r.id }}</td>
          <td>{{ r.employee?.id }}</td>
          <td>{{ r.reviewPeriod }}</td>
          <td>{{ r.rating }}</td>
          <td>{{ r.reviewDate | date: 'yyyy-MM-dd' }}</td>
          <td>{{ r.feedback }}</td>
        </tr>
        <tr *ngIf="reviews.length === 0">
          <td colspan="6" class="text-center text-muted">No reviews. Enter Manager ID and click Load Reviews.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-header"><strong>Submit Review</strong></div>
    <div class="card-body">
      <form #reviewForm="ngForm" (ngSubmit)="submitReview()">
        <div class="row g-3">
          <div class="col-md-3">
            <label for="employeeId" class="form-label">Employee ID</label>
            <input type="number" id="employeeId" name="employeeId" class="form-control" required [(ngModel)]="newReview.employeeId" />
          </div>
          <div class="col-md-3">
            <label for="reviewPeriod" class="form-label">Review Period</label>
            <input type="text" id="reviewPeriod" name="reviewPeriod" class="form-control" placeholder="e.g. Q1-2026" required [(ngModel)]="newReview.reviewPeriod" />
          </div>
          <div class="col-md-2">
            <label for="rating" class="form-label">Rating (1-5)</label>
            <input type="number" min="1" max="5" id="rating" name="rating" class="form-control" [(ngModel)]="newReview.rating" />
          </div>
          <div class="col-md-2">
            <label for="reviewDate" class="form-label">Review Date</label>
            <input type="date" id="reviewDate" name="reviewDate" class="form-control" required [(ngModel)]="newReview.reviewDate" />
          </div>
          <div class="col-12">
            <label for="feedback" class="form-label">Feedback (optional)</label>
            <textarea id="feedback" name="feedback" class="form-control" rows="2" [(ngModel)]="newReview.feedback"></textarea>
          </div>
        </div>
        <div class="mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="reviewForm.invalid || isSubmitting">
            {{ isSubmitting ? 'Submitting...' : 'Submit Review' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
