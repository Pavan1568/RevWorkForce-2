<div class="container mt-3">
  <h2 class="mb-3">My Goals</h2>

  <div class="card mb-3">
    <div class="card-body">
      <form class="row g-3 align-items-end" (ngSubmit)="loadGoals()" #idForm="ngForm">
        <div class="col-md-4">
          <label for="employeeId" class="form-label">Employee ID</label>
          <input
            type="number"
            id="employeeId"
            name="employeeId"
            class="form-control"
            required
            [(ngModel)]="employeeId"
          />
        </div>
        <div class="col-md-3">
          <button type="submit" class="btn btn-secondary" [disabled]="idForm.invalid">Load Goals</button>
        </div>
      </form>
    </div>
  </div>

  <div class="table-responsive mb-4">
    <table class="table table-sm table-striped table-bordered">
      <thead class="table-light">
        <tr>
          <th scope="col">ID</th>
          <th scope="col">Title</th>
          <th scope="col">Year</th>
          <th scope="col">Deadline</th>
          <th scope="col">Progress</th>
          <th scope="col">Status</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let g of goals">
          <td>{{ g.id }}</td>
          <td>{{ g.title }}</td>
          <td>{{ g.year }}</td>
          <td>{{ g.deadline | date: 'yyyy-MM-dd' }}</td>
          <td>
            <span *ngIf="editingProgressGoalId !== g.id">
              {{ g.progress ?? 0 }}%
              <button type="button" class="btn btn-sm btn-outline-primary ms-1" (click)="startEditProgress(g)">Edit</button>
            </span>
            <span *ngIf="editingProgressGoalId === g.id" class="d-flex align-items-center gap-2">
              <input type="number" min="0" max="100" class="form-control form-control-sm" style="width: 80px;" [(ngModel)]="editingProgressValue" />
              <button type="button" class="btn btn-sm btn-primary" (click)="saveProgress()">Save</button>
              <button type="button" class="btn btn-sm btn-secondary" (click)="cancelEditProgress()">Cancel</button>
            </span>
          </td>
          <td>{{ g.status }}</td>
        </tr>
        <tr *ngIf="goals.length === 0">
          <td colspan="6" class="text-center text-muted">No goals found. Load goals or create one below.</td>
        </tr>
      </tbody>
    </table>
  </div>

  <div class="card">
    <div class="card-header"><strong>Create Goal</strong></div>
    <div class="card-body">
      <form #goalForm="ngForm" (ngSubmit)="createGoal()">
        <div class="row g-3">
          <div class="col-md-6">
            <label for="title" class="form-label">Title</label>
            <input type="text" id="title" name="title" class="form-control" required [(ngModel)]="newGoal.title" />
          </div>
          <div class="col-md-3">
            <label for="year" class="form-label">Year</label>
            <input type="number" id="year" name="year" class="form-control" [(ngModel)]="newGoal.year" />
          </div>
          <div class="col-md-3">
            <label for="deadline" class="form-label">Deadline</label>
            <input type="date" id="deadline" name="deadline" class="form-control" [(ngModel)]="newGoal.deadline" />
          </div>
          <div class="col-12">
            <label for="description" class="form-label">Description (optional)</label>
            <textarea id="description" name="description" class="form-control" rows="2" [(ngModel)]="newGoal.description"></textarea>
          </div>
        </div>
        <div class="mt-3">
          <button type="submit" class="btn btn-primary" [disabled]="goalForm.invalid || isSubmitting">
            {{ isSubmitting ? 'Creating...' : 'Create Goal' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
